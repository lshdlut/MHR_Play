name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read pages manifest
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import json
          from pathlib import Path
          data = json.loads(Path("release/site_manifest.json").read_text(encoding="utf-8"))
          print(f"PLAY_REPO={data['play']['repo']}")
          print(f"PLAY_REF={data['play']['ref']}")
          PY

      - name: Clone pinned Play source
        shell: bash
        run: |
          git clone --filter=blob:none "$PLAY_REPO" "$RUNNER_TEMP/mujoco-wasm-play"
          git -C "$RUNNER_TEMP/mujoco-wasm-play" checkout "$PLAY_REF"

      - name: Build Pages site
        run: |
          python tools/build_github_pages.py \
            --play-src "$RUNNER_TEMP/mujoco-wasm-play" \
            --out "$RUNNER_TEMP/mhr-pages-site"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/mhr-pages-site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
